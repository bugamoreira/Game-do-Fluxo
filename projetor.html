<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projetor — FLAME 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#060a13;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes trophyPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.btn{border:none;color:#fff;padding:8px 20px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
.btn:hover{filter:brightness(1.15)}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/projector/main.tsx"></script>
</body>
</html>
