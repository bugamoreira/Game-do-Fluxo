<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantao Travado — ED Leaders x FLAME 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#060a13;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif}

@keyframes pulse    {0%,100%{opacity:1}50%{opacity:.35}}
@keyframes bounce   {0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes shake    {0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes fadeIn   {from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes cascPulse{0%,100%{opacity:1}50%{opacity:.8}}
@keyframes scorePulseUp{0%{transform:scale(1)}50%{transform:scale(1.12);color:#22c55e}100%{transform:scale(1)}}
@keyframes scorePulseDown{0%{transform:scale(1)}50%{transform:scale(1.12);color:#ef4444}100%{transform:scale(1)}}
@keyframes sectorGlow{0%{box-shadow:0 0 0 rgba(0,212,255,0)}50%{box-shadow:0 0 12px rgba(0,212,255,.3)}100%{box-shadow:0 0 0 rgba(0,212,255,0)}}

.chip{width:34px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0}
.chip:hover{transform:scale(1.08)}
.chip.selected{transform:scale(1.15);border:2px solid #00d4ff !important;background:rgba(0,212,255,.1) !important}
.slot{width:34px;height:44px;border-radius:6px;border:1px dashed rgba(255,255,255,.05);background:rgba(255,255,255,.01);flex-shrink:0}
.badge{position:absolute;font-size:9px;font-weight:700;line-height:1}
.badge-tr{top:-4px;right:-5px}
.badge-bl{bottom:-1px;left:-3px}
.badge-br{bottom:-1px;right:-3px}
.sector{border-radius:10px;padding:10px;transition:all .3s}
.sector.valid-target{border:2px dashed #00d4ff !important;box-shadow:0 0 15px rgba(0,212,255,.15)}
.sector.flash{animation:shake .4s;border-color:#ef4444 !important;box-shadow:0 0 15px rgba(239,68,68,.3)}
.metric{display:flex;align-items:center;gap:3px;padding:2px 7px;background:rgba(255,255,255,.02);border-radius:5px;font-size:10px}
.log-entry{font-size:10px;padding:4px 6px;border-radius:5px;margin-bottom:2px;line-height:1.4}
.subarea{border-radius:8px;padding:6px;flex:1;min-height:44px}
.btn{border:none;color:#fff;padding:5px 14px;border-radius:6px;font-weight:700;font-size:11px;cursor:pointer;transition:all .2s}
.btn:hover{filter:brightness(1.15)}
.btn:disabled{opacity:.5;cursor:not-allowed}
input{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:10px 14px;border-radius:8px;font-size:14px;width:100%;outline:none;transition:border-color .2s}
input:focus{border-color:#00d4ff}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/player/main.tsx"></script>
</body>
</html>
